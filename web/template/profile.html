<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile of {{ .User.Pseudo }}</title>
    <link rel="stylesheet" href="web/static/css/styles.css">
</head>

<body>
    <header>
        <h1>Profile of {{ .User.Pseudo }}</h1>
    </header>
    
    <div>
        <img src="data:image/jpeg;base64,{{ .User.ProfilePicture }}" alt="Profile Picture of {{ .User.Pseudo }}">
        <p>Email: {{ .User.Email }}</p>
        <p>Role: {{ .User.Role }}</p>
        <!-- Add more fields if needed -->
    </div>

    <footer>
        <a href="/dashboard">Back to Dashboard</a>
    </footer>
</body>
</html>
